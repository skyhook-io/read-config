name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq v4
        run: |
          if command -v yq && yq --version | grep -qE 'version v?4\.'; then exit 0; fi
          sudo curl -fsSL --retry 3 --retry-delay 2 \
            -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.47.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - run: bash tests/metadata_test.sh
      - run: bash tests/parse_test.sh

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action against fixture (buildContext present)
        id: cfg
        uses: ./
        with:
          working_directory: tests/fixtures
          service_name: smoke-svc
          default_build_context: '.'
          default_dockerfile_path: Dockerfile

      - name: Verify outputs
        run: |
          set -e
          test "${{ steps.cfg.outputs.config_found }}" = "true"
          test "${{ steps.cfg.outputs.service_found }}" = "true"
          test "${{ steps.cfg.outputs.name }}" = "smoke-svc"
          test "${{ steps.cfg.outputs.path }}" = "services/smoke"
          test "${{ steps.cfg.outputs.deployment_repo }}" = "KoalaOps/deployment"
          test "${{ steps.cfg.outputs.deployment_repo_path }}" = "smoke"
          test "${{ steps.cfg.outputs.build_context }}" = "services/smoke"
          test "${{ steps.cfg.outputs.dockerfile_path }}" = "services/smoke/Dockerfile"
          echo "smoke-svc outputs OK"

      - name: Run action against fixture (buildContext absent -> default_build_context applied)
        id: cfg2
        uses: ./
        with:
          working_directory: tests/fixtures
          service_name: smoke-default-context
          default_build_context: '.'
          default_dockerfile_path: Dockerfile

      - name: Verify default-context outputs
        run: |
          set -e
          test "${{ steps.cfg2.outputs.build_context }}" = "."
          test "${{ steps.cfg2.outputs.dockerfile_path }}" = "services/default/Dockerfile"
          echo "default-context outputs OK"

      - name: Run action against fixture (service missing, defaults flow through)
        id: cfg3
        uses: ./
        with:
          working_directory: tests/fixtures
          service_name: does-not-exist
          default_build_context: '.'
          default_dockerfile_path: Dockerfile

      - name: Verify missing-service fallback outputs
        run: |
          set -e
          test "${{ steps.cfg3.outputs.config_found }}" = "true"
          test "${{ steps.cfg3.outputs.service_found }}" = "false"
          test "${{ steps.cfg3.outputs.name }}" = ""
          test "${{ steps.cfg3.outputs.build_context }}" = "."
          test "${{ steps.cfg3.outputs.dockerfile_path }}" = "Dockerfile"
          echo "missing-service fallback outputs OK"

      - name: Run action with include_env=true (environments present)
        id: cfg4
        uses: ./
        with:
          working_directory: tests/fixtures
          service_name: smoke-svc
          default_build_context: '.'
          default_dockerfile_path: Dockerfile
          include_env: 'true'

      - name: Verify environments output is populated
        # IMPORTANT: env-passthrough (not direct ${{ }} in run:). The
        # environments YAML can contain quotes / $ / backticks that the
        # shell would otherwise re-interpret. This step doubles as a
        # contract test for the README's recommended usage pattern.
        env:
          ENVS: ${{ steps.cfg4.outputs.environments }}
        run: |
          set -e
          test -n "$ENVS"
          printf '%s\n' "$ENVS" > /tmp/envs.yaml
          yq '.[].name' /tmp/envs.yaml | grep -q '^dev$'
          yq '.[].name' /tmp/envs.yaml | grep -q '^prod$'
          echo "include_env=true outputs OK"

      - name: Run action with include_env=true against fixture without environments
        id: cfg5
        continue-on-error: true
        uses: ./
        with:
          working_directory: tests/fixtures-no-env
          service_name: smoke-svc
          default_build_context: '.'
          default_dockerfile_path: Dockerfile
          include_env: 'true'

      - name: Verify include_env=true with no env block fails 'Not supported yet'
        run: |
          set -e
          if [ "${{ steps.cfg5.outcome }}" != "failure" ]; then
            echo "FAIL: include_env=true with no env block should have failed (outcome=${{ steps.cfg5.outcome }})"
            exit 1
          fi
          echo "include_env=true 'Not supported yet' contract OK"
